name.length.range.min=7 #It doesn't work in DTO as min attribute of @Size annotation is of type int and cannot accept ${}
name.length.range.max=50
#It doesn't work in DTO as Pattern annotation's regexp attribute cannot accept ${}
name.pattern=^[A-Za-z\s]+$ 
name.invalid.message=Name must contain only letters and spaces.
name.size.message=Name must be between {min} and {max} characters long.

password.size.message=Password must be between {min} and {max} characters long.

role.validLength.message=Role must be between 5 and 20 characters long.