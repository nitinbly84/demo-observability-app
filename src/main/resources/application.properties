spring.application.name=demo-observability-app
server.port=8080

spring.profiles.active=dev

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted

management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.version=1.0.0

spring.cache.cache-names=Values

spring.mvc.problemdetails.enabled=true

spring.datasource.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Disable Hibernate DDL generation as Liquibase will manage the schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Without below line logs show the OpenEntityManagerInViewInterceptor (OEMIV) triggering for a simple property-check endpoint.
# The reason this is happening is that Open Session in View is enabled by default in Spring Boot. 
# It opens a JPA EntityManager at the start of every web request and closes it at the end, regardless of whether that 
# request actually needs to talk to a database. Its a waste of resources and can lead to unexpected behavior, so we disable it here.
spring.jpa.open-in-view=false

# Enable Liquibase and specify the custom location of the changelog file
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# enable H2 console (optional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Group APIs by controller/package (optional)
springdoc.packages-to-scan=com.example.demo.controller
springdoc.paths-to-match=/api/**

# ScheduledPrint.java defines 2 scheduled tasks, so we set the pool size to 5 to allow them to run concurrently without blocking each other.
# If we had more scheduled tasks or wanted to ensure that they could run without delay, we could increase this number further.
spring.task.scheduling.pool.size=3

# Logging configuration
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.example.demoobservabilityapp=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.boot.actuate.metrics=DEBUG
logging.level.io.micrometer=DEBUG
logging.level.org.liquibase=INFO
logging.level.org.springframework.boot.autoconfigure.liquibase=INFO
logging.level.org.springframework.jdbc.datasource=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
