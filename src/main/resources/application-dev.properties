demo.message=Hello from DEV profile

server.servlet.session.timeout=1

spring.threads.virtual.enabled=true

#demo.name=Nitin

demo.first.enabled=false

user.min.role.length=4
user.max.role.length=20

#All users can access the Togglz Admin Console, but make it secured in production
togglz.console.secured=false

# Explicitly enable the console
togglz.console.enabled=true
togglz.console.path=/togglz-console

# docker run -d --name my-redis -p 6379:6379 redis:8.4.2-alpine3.22
spring.cache.type=redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=6379

spring.cache.redis.key-prefix=togglz-
#spring.cache.redis.time-to-live=5s # this timeout doesn't work with RedisStateRepository, so no use here.
spring.cache.redis.use-key-prefix=true

# ------------------------------------------------------------------------------
# VaultController - dedicated hourly-rotating log file
# Output directory: /opt/app/logs  (tmpfs mount in docker-compose)
# See logback-spring.xml for the full appender configuration.
# ------------------------------------------------------------------------------
 
# Root output directory consumed by logback-spring.xml via <springProperty>
logging.file.path=/opt/app/logs
 
# Log level for VaultController (also picked up by logback-spring.xml)
logging.level.com.applicationPOC.controller.VaultController=DEBUG

# Reduce verbosity to prevent logging framework overhead from impacting performance metrics
logging.level.org.springframework.web.servlet.DispatcherServlet=INFO
logging.level.org.springframework.web.context.request.async=INFO
 
# ---- Retention & sizing (override per-profile or via env var) --------
# Number of hourly archive files to keep  (168 = 7 days)
logging.vault.max-history-hours=168
# Hard cap across ALL archived vault log files combined
logging.vault.total-size-cap=1GB
# AsyncAppender internal queue depth
logging.vault.async-queue-size=1024

// Structured logging format for console and file appenders
logging.structured.format.console=json
logging.structured.format.file=ecs


# Keep connections alive longer to accommodate the 2-second processing overhead
# Note: Tomcat's keep-alive timeout is the duration that a connection can remain idle before being closed.
# Setting it too high can lead to resource exhaustion under heavy load, so monitor your application's performance and adjust as necessary.
server.tomcat.keep-alive-timeout=85000
server.tomcat.connection-timeout=85000

# Increase Tomcat's capacity to queue incoming requests before dispatching to Spring
# This helps prevent connection refusals during traffic spikes, but be mindful of memory usage and adjust as needed.
server.tomcat.accept-count=200
server.tomcat.max-connections=500

# Ensure Spring's internal MVC async wrapper has plenty of processing headroom
# Note: This is the timeout for the async request processing, not the Tomcat connection timeout.
# The Tomcat timeouts above should be set higher than this to prevent premature connection closure.
spring.mvc.async.request-timeout=80000

