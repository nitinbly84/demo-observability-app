gatling {
  http {
    ahc {
      # Time out in milliseconds for establishing a connection
      connectTimeout = 80000
      # Time out in milliseconds for reading chunks of data from the socket
      readTimeout = 80000
      # Time out in milliseconds for the overall request-response cycle
      requestTimeout = 80000
    }
  }
}

# This configuration file is used by Gatling to set up the HTTP client for performance testing. 
# The timeouts are set to 80 seconds to allow for longer response times during testing,
# which can be useful for identifying performance bottlenecks in the application being tested.