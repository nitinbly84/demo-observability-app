name: demo-observability-app

# 1. Define the variable using an anchor
x-timezone: &default-tz "Asia/Kolkata"

services:
  redis:
    image: redis:8.4.2-alpine3.22
    container_name: redis
    environment:
      TZ: *default-tz # Use alias
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  vault:
    image: hashicorp/vault:1.15
    container_name: vault-prod
    ports:
      - "8200:8200"
    volumes:
      - ./vault/config:/vault/config
      - ./vault/data:/vault/data
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_API_ADDR: http://0.0.0.0:8200
      TZ: *default-tz # Use alias
    networks:
      - app-network
    # This command checks if the 'container_id' file matches the current container.
    # If it doesn't exist or is different, it wipes the data folder.
    # Use single quotes for the shell command so $HOSTNAME isn't interpolated by host
    command: >
      sh -c '
          CURRENT_ID=$$(hostname);
          if [ ! -f /vault/data/container_id ] || [ "$$(cat /vault/data/container_id)" != "$$CURRENT_ID" ]; then
            echo "New container detected. Wiping stale data folder...";
            rm -rf /vault/data/*;
            echo "$$CURRENT_ID" > /vault/data/container_id;
          fi;
          exec vault server -config=/vault/config/vault-config.hcl
        '
    healthcheck:
      # FIX: Returns 0 if process is alive, even if sealed. 
      # This allows vault-init to move past 'depends_on'.
      test: ["CMD-SHELL", "vault status -format=json || exit 0"]
      interval: 5s
      timeout: 5s
      retries: 5

  vault-init:
      image: hashicorp/vault:1.15
      container_name: vault-init
      depends_on:
        vault:
          condition: service_healthy
      volumes:
        - ./setup-vault.sh:/setup-vault.sh
        - ./vault:/vault
      entrypoint: ["/bin/sh", "/setup-vault.sh"]
      networks:
        - app-network
      environment:
        VAULT_ADDR: http://vault:8200
        TZ: *default-tz # Use alias

# --- NEW: Application Service ---
  app:
    image: demo-observability-app:v1
    container_name: observability-app
    #read_only: TRUE
    tmpfs:
      - /tmp # /tmp stays in-memory (JVM scratch space, no value persisting it)
    volumes:
      - ./vault/logs:/opt/app/logs:rw  # Persists VaultController logs on the host; survives container crashes
    build:
        context: .
        dockerfile: Dockerfile
        args:
          # Pass the specific JDK image here
          - BASE_IMAGE=eclipse-temurin:21-jdk-alpine 
          # Pass the internal port used during build
          - APP_PORT=8080
    depends_on:
      vault-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - app-network
    environment:
      # CRITICAL: Use 'vault' hostname, not localhost
        SPRING_CLOUD_VAULT_URI: http://vault:8200
        SPRING_CLOUD_VAULT_ROLE_ID: demo-app-role-id
        SPRING_CLOUD_VAULT_ROLE_NAME: springboot-role
        SPRING_CLOUD_VAULT_SECRET_ID: demo-app-secret-id
        SPRING_DATA_REDIS_HOST: redis
        SPRING_PROFILES_ACTIVE: dev # Change it if want to use different profile specific properties
        LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CORE_IO_SUPPORT: DEBUG
        LOGGING_FILE_PATH: /opt/app/logs
        TZ: *default-tz # Sets OS timezone
      # Injecting the same variable into Java Options and all environment variables are displayed in the logs,
	  # so this also confirms that the variable is correctly passed to the container.
        JAVA_OPTS: -XshowSettings:properties
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          memory: 512M
    
volumes:
  redis-data:
  # Below volumes are defined but not used in this setup, as we're mounting host directories for persistence.
  #redis-insight-data:
  #vault-data:
networks:
  app-network:
    driver: bridge